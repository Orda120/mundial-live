<!-- @dsCard group="Type" viewport="700x190" name="Weight & size scale" subtitle="Hierarchy from weight — black headings, bold labels" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans)}
  body{padding:20px;display:flex;flex-direction:column;gap:11px}
  .r{display:flex;align-items:baseline;gap:12px}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--text-meta);width:128px;flex-shrink:0}
  .v{color:var(--text-strong)}
</style></head>
<body>
  <div class="r"><span class="t">xl · 900 · header</span><span class="v" style="font-size:20px;font-weight:900;letter-spacing:-.02em">כותרת אפליקציה</span></div>
  <div class="r"><span class="t">lg · 900 · title</span><span class="v" style="font-size:18px;font-weight:900">כותרת מסך</span></div>
  <div class="r"><span class="t">sm · 700 · label</span><span class="v" style="font-size:14px;font-weight:700">תווית / כפתור</span></div>
  <div class="r"><span class="t">xs · 700 · cell</span><span class="v" style="font-size:12px;font-weight:700">תא טבלה</span></div>
  <div class="r"><span class="t">xs · 400 · body</span><span class="v" style="font-size:12px;color:var(--text-body)">טקסט גוף רגיל</span></div>
  <div class="r"><span class="t">2xs · 400 · meta</span><span class="v" style="font-size:11px;color:var(--text-meta)">מטא · כיתוב</span></div>
</body></html>
