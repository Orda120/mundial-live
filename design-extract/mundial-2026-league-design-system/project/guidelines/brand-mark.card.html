<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans)}
  body{padding:0}
  .bar{display:flex;height:4px}
  .bar>div{flex:1}
  .body{padding:22px;display:flex;align-items:center;gap:22px}
  img{width:84px;height:84px;border-radius:18px;display:block}
  .h1{font-size:20px;font-weight:900;letter-spacing:-.02em;color:var(--text-heading)}
  .sub{font-size:12px;color:var(--text-meta);margin-top:3px}
  .tri{display:flex;gap:6px;margin-top:12px}
  .tri span{font-family:var(--font-mono);font-size:10px;color:var(--text-meta)}
  .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-inline-end:4px;vertical-align:-2px}
</style></head>
<body>
  <div class="bar"><div style="background:var(--host-1)"></div><div style="background:var(--host-2)"></div><div style="background:var(--host-3)"></div></div>
  <div class="body">
    <img src="../assets/app-icon.png" alt="Mundial 2026 League icon" />
    <div>
      <div class="h1">מונדיאל 2026 🇺🇸🇨🇦🇲🇽</div>
      <div class="sub">ליגת הימורים · מונדיאל 2026</div>
      <div class="tri">
        <span><i class="sw" style="background:var(--host-1)"></i>emerald</span>
        <span><i class="sw" style="background:var(--host-2)"></i>rose</span>
        <span><i class="sw" style="background:var(--host-3)"></i>sky</span>
      </div>
    </div>
  </div>
</body></html>
