<!-- @dsCard group="Type" viewport="700x180" name="Type families" subtitle="Native system sans for UI · monospace for every numeral" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans)}
  body{padding:20px;display:flex;flex-direction:column;gap:18px}
  .lbl{font-size:11px;color:var(--text-meta);margin-bottom:4px}
  .sans{font-family:var(--font-sans);color:var(--text-strong)}
  .mono{font-family:var(--font-mono);color:var(--text-strong)}
</style></head>
<body>
  <div>
    <div class="lbl">--font-sans · system-ui stack · headings &amp; UI</div>
    <div class="sans" style="font-size:24px;font-weight:900;letter-spacing:-.02em">מונדיאל 2026 · ליגת החברים</div>
    <div class="sans" style="font-size:14px;color:var(--text-body)">ליגת הימורים פרטית — דראפט חי, 1/X/2 ונוקאאוט.</div>
  </div>
  <div>
    <div class="lbl">--font-mono · numerals · scores · codes · rank</div>
    <div class="mono" style="font-size:24px;font-weight:700">24.5 · 2:1 · BRA–ARG · #1</div>
  </div>
</body></html>
