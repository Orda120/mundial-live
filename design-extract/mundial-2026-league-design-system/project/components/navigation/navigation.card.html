<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: var(--surface-canvas); }
  body { padding: 20px; font-family: var(--font-sans); }
  .wrap { max-width: 600px; display:flex; flex-direction:column; gap:16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TabBar, Section, Pill, Flag } = window.Mundial2026LeagueDesignSystem_4cb07a;
const I = ({ name, size=14 }) => {
  const ref = React.useRef(null);
  React.useEffect(() => { if (ref.current) { ref.current.innerHTML=''; const el=window.lucide.createElement(window.lucide[name]); el.setAttribute('width',size); el.setAttribute('height',size); ref.current.appendChild(el);} }, [name]);
  return <span ref={ref} style={{display:'inline-flex'}} />;
};
function Demo() {
  const [tab, setTab] = React.useState("table");
  const tabs = [
    { key:"table", label:"טבלה", icon:<I name="Trophy" /> },
    { key:"bets", label:"ההימורים שלי", icon:<I name="Target" /> },
    { key:"draft", label:"דראפט", icon:<I name="Shuffle" /> },
    { key:"sim", label:"סימולציה", icon:<I name="FlaskConical" /> },
    { key:"manage", label:"ניהול", icon:<I name="Settings" /> },
    { key:"rules", label:"חוקים", icon:<I name="BookOpen" /> },
  ];
  return (
    <div className="wrap">
      <TabBar tabs={tabs} active={tab} onChange={setTab} />
      <Section title="בית A" badge={6} sub="3 ננעלו" defaultOpen>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <Pill block selected icon={<Flag code="MEX" />}>מקסיקו</Pill>
          <Pill block icon={<Flag code="KOR" />}>קוריאה</Pill>
          <Pill block tone="emerald" selected mark="hit" icon={<Flag code="CZE" />}>צ׳כיה</Pill>
        </div>
      </Section>
      <Section title="בית B" badge={6} sub="טרם ננעל">
        <span style={{fontSize:12,color:'var(--text-meta)'}}>לחצו לפתיחה…</span>
      </Section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
