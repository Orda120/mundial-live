<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; background: var(--surface-canvas); }
  body { padding: 20px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 560px; }
  .lbl { font-size: 11px; color: var(--text-meta); margin-bottom: 8px; }
  .blk { display:flex; flex-direction:column; gap:10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TextField, ScoreInput } = window.Mundial2026LeagueDesignSystem_4cb07a;
function Demo() {
  const [name, setName] = React.useState("ליגת החברים");
  const [s, setS] = React.useState(["2", "1"]);
  return (
    <div className="grid">
      <div className="blk">
        <TextField label="שם הליגה" value={name} onChange={(e)=>setName(e.target.value)} />
        <TextField label="שחקן 1" placeholder="שם השחקן" value="" onChange={()=>{}} />
      </div>
      <div className="blk">
        <div>
          <div className="lbl">תוצאה — עריכה</div>
          <ScoreInput a={s[0]} b={s[1]} onChange={setS} />
        </div>
        <div>
          <div className="lbl">תוצאה — נעולה</div>
          <ScoreInput a="2" b="1" locked />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
